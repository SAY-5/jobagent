<!doctype html>
<html><body>
<form aria-label="Easy Apply">
  <h2>Contact info</h2>

  <label for="firstName">First name</label>
  <input id="firstName" name="firstName" type="text" required>

  <label for="lastName">Last name</label>
  <input id="lastName" name="lastName" type="text" required>

  <label for="email">Email address</label>
  <input id="email" name="email" type="email" required>

  <label for="phone">Mobile phone number</label>
  <input id="phone" name="phone" type="tel">

  <label for="auth">Are you authorized to work in the United States?</label>
  <select id="auth" name="auth" required>
    <option value="">Select an option</option>
    <option>Yes</option>
    <option>No</option>
  </select>

  <label for="years">Years of experience with Python</label>
  <input id="years" name="years" type="number">

  <label for="why">Why are you a great fit for this role?</label>
  <textarea id="why" name="why" maxlength="500" required></textarea>

  <label for="resume">Upload your resume</label>
  <input id="resume" name="resume" type="file" required>
</form>
</body></html>
